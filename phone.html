<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Koffee Bru – Spin!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600;700&display=swap');
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --olive:#4a5240; --olive-dark:#2e3328; --olive-mid:#3d4436;
    --cream:#f5f0e8; --cream-dark:#e8e0cc;
    --gold:#c9a84c; --gold-light:#e8c96a; --bg:#1a1c18;
  }
  html,body { width:100%; height:100%; background:var(--bg); font-family:'Inter',sans-serif; color:var(--cream); overflow:hidden; -webkit-tap-highlight-color:transparent; }
  body { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; min-height:100vh; position:relative; }
  body::before { content:''; position:fixed; inset:0; background-image:radial-gradient(circle,rgba(201,168,76,0.08) 1px,transparent 1px); background-size:32px 32px; pointer-events:none; }

  .brand { font-family:'Playfair Display',serif; font-size:30px; font-weight:900; color:var(--gold); text-align:center; margin-bottom:4px; position:relative; z-index:1; }
  .tagline { font-size:10px; letter-spacing:0.2em; text-transform:uppercase; color:var(--cream-dark); opacity:0.6; text-align:center; margin-bottom:40px; position:relative; z-index:1; }

  .spin-btn-wrap { position:relative; z-index:1; margin-bottom:36px; display:flex; align-items:center; justify-content:center; width:220px; height:220px; }
  .ripple1, .ripple2 { position:absolute; border-radius:50%; border:2px solid rgba(201,168,76,0.2); width:210px; height:210px; animation:ripple 2.5s ease-out infinite; pointer-events:none; }
  .ripple2 { animation-delay:1.2s; }
  @keyframes ripple { 0%{width:185px;height:185px;opacity:0.8} 100%{width:270px;height:270px;opacity:0} }

  .spin-btn {
    width:185px; height:185px; border-radius:50%;
    border:3px solid var(--gold); background:var(--olive-mid);
    color:var(--cream); cursor:pointer;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;
    position:relative; z-index:2;
    -webkit-tap-highlight-color:transparent;
    outline:none; border:3px solid var(--gold);
    transition:transform 0.1s ease, background 0.15s ease;
  }
  .spin-btn:active { transform:scale(0.93); background:var(--olive); }
  .spin-btn.disabled { opacity:0.4; }
  .spin-icon { font-size:34px; line-height:1; display:block; }
  .spin-label { font-size:12px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:var(--gold); margin-top:2px; }
  .spin-btn.is-spinning .spin-icon { animation:rotateSpin 0.7s linear infinite; }
  @keyframes rotateSpin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }

  .state-msg { font-size:15px; color:var(--cream-dark); text-align:center; opacity:0.8; min-height:60px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; position:relative; z-index:1; padding:0 20px; }
  .state-msg .prize-name { font-family:'Playfair Display',serif; font-size:26px; font-weight:700; color:var(--gold-light); }

  /* Debug bar — always visible for troubleshooting */
  .dbg { position:fixed; bottom:0; left:0; right:0; background:rgba(0,0,0,0.8); font-size:11px; color:#888; padding:8px 12px; z-index:99; line-height:1.7; word-break:break-all; }
  .dbg .ok  { color:#7ab648; }
  .dbg .err { color:#e05c5c; }
  .dbg .url { color:#6ab; }
</style>
</head>
<body>

<div class="brand">Koffee Bru</div>
<div class="tagline">Spin &amp; Win</div>

<div class="spin-btn-wrap">
  <div class="ripple1"></div>
  <div class="ripple2"></div>
  <div class="spin-btn disabled" id="spinBtn">
    <span class="spin-icon">☕</span>
    <span class="spin-label">Tap to Spin</span>
  </div>
</div>

<div class="state-msg" id="stateMsg"><span>Loading...</span></div>

<div class="dbg" id="dbg">
  Base URL: <span class="url" id="dbgUrl">—</span><br>
  Status: <span id="dbgStatus">starting...</span>
</div>

<script>
const BASE = '';
document.getElementById('dbgUrl').textContent = BASE;

const btn      = document.getElementById('spinBtn');
const stateMsg = document.getElementById('stateMsg');
const dbgStatus = document.getElementById('dbgStatus');

let busy = false;
let lastSeenResultAt = 0;

function log(msg, cls) {
  dbgStatus.className = cls || '';
  dbgStatus.textContent = msg;
  console.log(msg);
}

function setReady() {
  busy = false;
  btn.classList.remove('disabled', 'is-spinning');
  stateMsg.innerHTML = '<span>Good luck! 🤞</span>';
  log('Ready — tap to spin', 'ok');
}
function setSpinning() {
  busy = true;
  btn.classList.add('is-spinning');
  btn.classList.remove('disabled');
  stateMsg.innerHTML = '<span>Spinning...</span>';
  log('Spinning...', 'ok');
}
function setResult(prize) {
  busy = false;
  btn.classList.remove('is-spinning');
  btn.classList.add('disabled');
  stateMsg.innerHTML = `<span>You won!</span><span class="prize-name">${prize}</span>`;
  log('Result: ' + prize, 'ok');
}

let pollTimer = null;
function waitForResult() {
  log('Polling for result...');
  pollTimer = setInterval(() => {
    fetch(BASE + '/api/state')
      .then(r => r.json())
      .then(d => {
        if (d.state.resultAt && d.state.resultAt > lastSeenResultAt) {
          lastSeenResultAt = d.state.resultAt;
          clearInterval(pollTimer);
          setResult(d.state.lastResult);
          setTimeout(() => setReady(), 5000);
        }
      })
      .catch(e => log('Poll error: ' + e.message, 'err'));
  }, 1000);
}

function doSpin() {
  if (busy) { log('Busy — ignoring tap'); return; }
  log('Tapped — sending spin...');
  setSpinning();
  fetch(BASE + '/api/spin', { method: 'POST' })
    .then(r => r.json())
    .then(d => {
      log('Spin sent OK', 'ok');
      waitForResult();
    })
    .catch(e => {
      log('Spin fetch error: ' + e.message, 'err');
      setTimeout(setReady, 3000);
    });
}

// Use touchstart for iOS — most reliable
btn.addEventListener('touchstart', function(e) {
  e.preventDefault();
  doSpin();
}, { passive: false });

// Fallback for non-touch (desktop testing)
btn.addEventListener('click', function(e) {
  // Only fire on click if not a touch device (avoid double-firing)
  if (!e.isTrusted || window.matchMedia('(hover:none)').matches) return;
  doSpin();
});

// Init
log('Fetching state from ' + BASE);
fetch(BASE + '/api/state')
  .then(r => r.json())
  .then(d => {
    lastSeenResultAt = d.state.resultAt || 0;
    log('Connected! Ready.', 'ok');
    setReady();
  })
  .catch(e => {
    log('Cannot reach server: ' + e.message, 'err');
    stateMsg.innerHTML = '<span>Cannot reach server.<br>Are you on the same WiFi?</span>';
    setTimeout(() => location.reload(), 5000);
  });
</script>
</body>
</html>
